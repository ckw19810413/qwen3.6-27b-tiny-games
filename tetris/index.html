<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>俄羅斯方塊</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  color: #e0e0e0;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  user-select: none;
  -webkit-user-select: none;
  overflow: hidden;
}

/* ── Desktop layout ── */
#game-wrapper {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  transition: flex-direction 0.3s;
}
#left-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
}
canvas#game {
  border: 2px solid #333;
  border-radius: 4px;
  background: #111;
  display: block;
}
#right-panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 180px;
}
.panel-box {
  background: #151525;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  padding: 12px;
}
.panel-box h3 {
  text-align: center;
  margin-bottom: 6px;
  font-size: 12px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.stat-value {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  color: #0ff;
}
canvas#next {
  display: block;
  margin: 0 auto;
  background: #0a0a15;
  border-radius: 4px;
  border: 1px solid #2a2a4a;
}
#leaderboard-list {
  list-style: none;
  padding: 0;
}
#leaderboard-list li {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  border-bottom: 1px solid #1a1a2a;
  font-size: 12px;
}
#leaderboard-list li:first-child { color: #ffd700; }
#leaderboard-list li:nth-child(2) { color: #c0c0c0; }
#leaderboard-list li:nth-child(3) { color: #cd7f32; }
#leaderboard-list li span.rank { color: #666; margin-right: 4px; }
#leaderboard-list li span.score { color: #0ff; font-weight: bold; }

/* ── Touch controls ── */
#touch-controls {
  display: none;
  margin-top: 12px;
  gap: 6px;
  width: 100%;
}
.touch-row {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 6px;
}
.touch-btn {
  width: 64px; height: 54px;
  background: #1a1a2e;
  border: 2px solid #3a3a5a;
  border-radius: 10px;
  color: #0ff;
  font-size: 22px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.touch-btn:active {
  background: #2a2a4a;
  border-color: #0ff;
}
.touch-btn.wide {
  width: 136px;
}

/* ── Overlays ── */
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 10;
}
#overlay.show { display: flex; }
#game-over-box {
  background: #151525;
  border: 2px solid #0ff;
  border-radius: 12px;
  padding: 28px 24px;
  text-align: center;
  min-width: 280px;
  max-width: 90vw;
}
#game-over-box h2 {
  font-size: 24px;
  color: #f44;
  margin-bottom: 12px;
}
#game-over-box .final-score {
  font-size: 18px;
  color: #0ff;
  margin-bottom: 12px;
}
#game-over-box input {
  background: #0a0a15;
  border: 1px solid #444;
  color: #fff;
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 16px;
  width: 180px;
  text-align: center;
  margin-bottom: 8px;
  outline: none;
}
#game-over-box input:focus { border-color: #0ff; }
#game-over-box .top-msg {
  color: #ffd700;
  font-size: 14px;
  margin-bottom: 8px;
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.btn {
  background: #0ff;
  color: #000;
  border: none;
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 8px;
}
.btn:hover { background: #0dd; }
.btn:active { transform: scale(0.96); }

#start-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 20;
}
#start-overlay.hidden { display: none; }
#start-box { text-align: center; padding: 20px; }
#start-box h1 {
  font-size: 32px;
  color: #0ff;
  margin-bottom: 20px;
}
#start-box .controls {
  color: #888;
  font-size: 13px;
  line-height: 2;
  margin-bottom: 16px;
}
#start-box .controls kbd {
  background: #222;
  border: 1px solid #444;
  border-radius: 4px;
  padding: 2px 7px;
  color: #0ff;
}

/* ── Stats row (mobile) ── */
#stats-row {
  display: none;
  gap: 8px;
  margin-top: 8px;
  width: 100%;
}
.stat-chip {
  background: #151525;
  border: 1px solid #2a2a4a;
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  text-align: center;
  flex: 1;
}
.stat-chip .val { color: #0ff; font-weight: bold; font-size: 16px; }

/* ── Mobile responsive ── */
@media (max-width: 600px) {
  body {
    align-items: flex-start;
    padding: 8px;
  }
  #game-wrapper {
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  #right-panel {
    display: none;
  }
  #stats-row {
    display: flex;
  }
  #touch-controls {
    display: block;
  }
  #start-box h1 { font-size: 26px; }
  #game-over-box { padding: 20px 16px; }
  #game-over-box h2 { font-size: 20px; }
}

/* Landscape mobile */
@media (max-width: 600px) and (orientation: landscape) {
  #game-wrapper {
    flex-direction: row;
    align-items: flex-start;
  }
  #right-panel {
    display: flex;
    width: 140px;
    gap: 8px;
  }
  .panel-box { padding: 8px 6px; }
  .panel-box h3 { font-size: 10px; }
  .stat-value { font-size: 16px; }
  #touch-controls { display: none; }
  #stats-row { display: none; }
}
</style>
</head>
<body>

<div id="start-overlay">
  <div id="start-box">
    <h1>俄羅斯方塊</h1>
    <div class="controls">
      <kbd>←</kbd> <kbd>→</kbd> 左右移動 &nbsp; <kbd>↑</kbd> 旋轉<br>
      <kbd>↓</kbd> 加速 &nbsp; <kbd>Space</kbd> 掉底 &nbsp; <kbd>P</kbd> 暫停
    </div>
    <button class="btn" id="start-btn">開始遊戲</button>
  </div>
</div>

<div id="overlay">
  <div id="game-over-box">
    <h2>遊戲結束</h2>
    <div class="final-score">分數：<span id="final-score">0</span></div>
    <div id="top-msg" class="top-msg" style="display:none">🎉 前十名！請輸入你的名字 🎉</div>
    <input id="name-input" type="text" placeholder="輸入名字" maxlength="10" style="display:none" />
    <br>
    <button class="btn" id="overlay-btn">再玩一次</button>
  </div>
</div>

<div id="game-wrapper">
  <div id="left-panel">
    <!-- Stats bar for mobile -->
    <div id="stats-row">
      <div class="stat-chip">分數<br><span class="val" id="score-mobile">0</span></div>
      <div class="stat-chip">等級<br><span class="val" id="level-mobile">1</span></div>
      <div class="stat-chip">行數<br><span class="val" id="lines-mobile">0</span></div>
      <div class="stat-chip" style="width:60px">
        <canvas id="next-mobile" width="50" height="50"></canvas>
      </div>
    </div>
    <canvas id="game" width="300" height="600"></canvas>
    <!-- Touch controls -->
    <div id="touch-controls">
      <div class="touch-row">
        <div class="touch-btn" data-action="rotate">↻</div>
      </div>
      <div class="touch-row">
        <div class="touch-btn" data-action="left">←</div>
        <div class="touch-btn" data-action="down">↓</div>
        <div class="touch-btn" data-action="right">→</div>
      </div>
      <div class="touch-row">
        <div class="touch-btn wide" data-action="drop">掉底</div>
      </div>
    </div>
  </div>
  <!-- Desktop right panel -->
  <div id="right-panel">
    <div class="panel-box">
      <h3>分數</h3>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="panel-box">
      <h3>等級</h3>
      <div class="stat-value" id="level">1</div>
    </div>
    <div class="panel-box">
      <h3>行數</h3>
      <div class="stat-value" id="lines">0</div>
    </div>
    <div class="panel-box">
      <h3>下一個</h3>
      <canvas id="next" width="120" height="120"></canvas>
    </div>
    <div class="panel-box">
      <h3>前十名</h3>
      <ul id="leaderboard-list"></ul>
    </div>
  </div>
</div>

<script>
// ── Responsive block size ──
let BLOCK = 30;
function resizeGame() {
  const canvas = document.getElementById('game');
  const maxW = Math.min(300, window.innerWidth - 32);
  BLOCK = Math.floor(maxW / 10);
  if (BLOCK < 14) BLOCK = 14;
  canvas.width = BLOCK * 10;
  canvas.height = BLOCK * 20;
  draw();
}

// ── Constants ──
const COLS = 10, ROWS = 20;
const PIECES = {
  I: { shape: [[0,0],[1,0],[2,0],[3,0]], color: '#00f0f0' },
  O: { shape: [[0,0],[1,0],[0,1],[1,1]], color: '#f0f000' },
  T: { shape: [[0,0],[1,0],[2,0],[1,1]], color: '#a000f0' },
  S: { shape: [[1,0],[2,0],[0,1],[1,1]], color: '#00f000' },
  Z: { shape: [[0,0],[1,0],[1,1],[2,1]], color: '#f00000' },
  J: { shape: [[0,0],[0,1],[1,1],[2,1]], color: '#0000f0' },
  L: { shape: [[2,0],[0,1],[1,1],[2,1]], color: '#f0a000' }
};
const PIECE_NAMES = Object.keys(PIECES);

// ── State ──
let board = [], current = null, nextPiece = null;
let score = 0, lines = 0, level = 1;
let dropTimer = null, dropInterval = 800;
let gameOver = false, paused = false, started = false;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next');
const nctx = nextCanvas.getContext('2d');
const nextMobileCanvas = document.getElementById('next-mobile');
const nmctx = nextMobileCanvas.getContext('2d');

// ── Leaderboard ──
function loadLeaderboard() {
  try { return JSON.parse(localStorage.getItem('tetris_leaderboard') || '[]'); }
  catch { return []; }
}
function saveLeaderboard(lb) {
  localStorage.setItem('tetris_leaderboard', JSON.stringify(lb));
}
function isInTop10(newScore) {
  const lb = loadLeaderboard();
  if (lb.length < 10) return newScore > 0;
  return newScore > lb[lb.length - 1].score;
}
function addScore(name, sc) {
  const lb = loadLeaderboard();
  lb.push({ name, score: sc });
  lb.sort((a, b) => b.score - a.score);
  saveLeaderboard(lb.slice(0, 10));
}
function renderLeaderboard() {
  const lb = loadLeaderboard();
  const ul = document.getElementById('leaderboard-list');
  ul.innerHTML = lb.length === 0 ? '<li style="color:#555">暫無紀錄</li>' :
    lb.map((e, i) => `<li><span><span class="rank">${i+1}.</span>${e.name}</span><span class="score">${e.score}</span></li>`).join('');
}

// ── Board ──
function newBoard() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(null));
}

// ── Bag Randomizer ──
let bag = [];
function nextRandom() {
  if (bag.length === 0) {
    bag = [...PIECE_NAMES];
    for (let i = bag.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [bag[i], bag[j]] = [bag[j], bag[i]];
    }
  }
  return bag.pop();
}

// ── Piece ──
function createPiece(name) {
  const p = PIECES[name];
  return {
    name,
    blocks: p.shape.map(([x,y]) => [x,y]),
    color: p.color,
    x: 3,
    y: -1
  };
}
function rotateBlocks(blocks) {
  const maxX = Math.max(...blocks.map(b => b[0]));
  const maxY = Math.max(...blocks.map(b => b[1]));
  return blocks.map(([x, y]) => [maxY - y, x]);
}
function getAbsolute(piece) {
  return piece.blocks.map(([bx, by]) => [piece.x + bx, piece.y + by]);
}
function isValid(piece, board) {
  const abs = getAbsolute(piece);
  for (const [x, y] of abs) {
    if (x < 0 || x >= COLS || y >= ROWS) return false;
    if (y >= 0 && board[y][x]) return false;
  }
  return true;
}

// ── Lock & Clear ──
function lockPiece() {
  const abs = getAbsolute(current);
  for (const [x, y] of abs) {
    if (y < 0) { triggerGameOver(); return; }
    board[y][x] = current.color;
  }
  clearLines();
  spawnPiece();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(null));
      cleared++;
      r++;
    }
  }
  if (cleared > 0) {
    const pts = [0, 100, 300, 500, 800];
    score += (pts[cleared] || 800) * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(50, 800 - (level - 1) * 70);
    updateUI();
  }
}

// ── Ghost ──
function calcGhost() {
  if (!current) return null;
  const g = { ...current, blocks: current.blocks.map(b => [...b]) };
  while (isValid({ ...g, y: g.y + 1 }, board)) g.y++;
  return g;
}

// ── Spawn ──
function spawnPiece() {
  current = createPiece(nextPiece || nextRandom());
  nextPiece = nextRandom();
  if (!isValid(current, board)) {
    current.y = -1;
    if (!isValid(current, board)) {
      triggerGameOver();
    }
  }
  drawNext();
  drawNextMobile();
}

// ── Drawing ──
function drawBlock(context, x, y, color, size, isGhost) {
  const px = x * size, py = y * size;
  if (isGhost) {
    context.strokeStyle = color;
    context.globalAlpha = 0.3;
    context.strokeRect(px + 1, py + 1, size - 2, size - 2);
    context.globalAlpha = 1;
  } else {
    context.fillStyle = color;
    context.fillRect(px, py, size, size);
    context.fillStyle = 'rgba(255,255,255,0.15)';
    context.fillRect(px, py, size, Math.max(2, size * 0.1));
    context.fillRect(px, py, Math.max(2, size * 0.1), size);
    context.fillStyle = 'rgba(0,0,0,0.25)';
    context.fillRect(px + size - Math.max(2, size*0.1), py, Math.max(2, size*0.1), size);
    context.fillRect(px, py + size - Math.max(2, size*0.1), size, Math.max(2, size*0.1));
    context.strokeStyle = 'rgba(0,0,0,0.5)';
    context.strokeRect(px, py, size, size);
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // grid
  ctx.strokeStyle = '#1a1a2a';
  ctx.lineWidth = 0.5;
  for (let c = 1; c < COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * BLOCK, 0); ctx.lineTo(c * BLOCK, ROWS * BLOCK); ctx.stroke();
  }
  for (let r = 1; r < ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * BLOCK); ctx.lineTo(COLS * BLOCK, r * BLOCK); ctx.stroke();
  }
  // board
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) drawBlock(ctx, c, r, board[r][c], BLOCK, false);
    }
  }
  if (!current) return;
  // ghost
  const g = calcGhost();
  if (g) {
    const gAbs = getAbsolute(g);
    for (const [x, y] of gAbs) {
      if (y >= 0) drawBlock(ctx, x, y, current.color, BLOCK, true);
    }
  }
  // current
  const abs = getAbsolute(current);
  for (const [x, y] of abs) {
    if (y >= 0) drawBlock(ctx, x, y, current.color, BLOCK, false);
  }
}

function drawNextPiece(context, cw, ch, pieceName) {
  context.clearRect(0, 0, cw, ch);
  if (!pieceName) return;
  const p = PIECES[pieceName];
  const bs = p.shape;
  const minX = Math.min(...bs.map(b=>b[0])), maxX = Math.max(...bs.map(b=>b[0]));
  const minY = Math.min(...bs.map(b=>b[1])), maxY = Math.max(...bs.map(b=>b[1]));
  const w = maxX - minX + 1, h = maxY - minY + 1;
  const size = Math.min(Math.floor((cw - 8) / w), Math.floor((ch - 8) / h));
  const offX = (cw - w * size) / 2;
  const offY = (ch - h * size) / 2;
  for (const [bx, by] of bs) {
    const px = offX + (bx - minX) * size;
    const py = offY + (by - minY) * size;
    context.fillStyle = p.color;
    context.fillRect(px, py, size, size);
    context.fillStyle = 'rgba(255,255,255,0.15)';
    context.fillRect(px, py, size, 2);
    context.fillRect(px, py, 2, size);
    context.fillStyle = 'rgba(0,0,0,0.25)';
    context.fillRect(px + size - 2, py, 2, size);
    context.fillRect(px, py + size - 2, size, 2);
    context.strokeStyle = 'rgba(0,0,0,0.5)';
    context.strokeRect(px, py, size, size);
  }
}

function drawNext() { drawNextPiece(nctx, nextCanvas.width, nextCanvas.height, nextPiece); }
function drawNextMobile() { drawNextPiece(nmctx, nextMobileCanvas.width, nextMobileCanvas.height, nextPiece); }

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('lines').textContent = lines;
  document.getElementById('score-mobile').textContent = score;
  document.getElementById('level-mobile').textContent = level;
  document.getElementById('lines-mobile').textContent = lines;
}

// ── Movement ──
function moveLeft() {
  if (!current || gameOver || paused) return;
  current.x--;
  if (!isValid(current, board)) current.x++;
}
function moveRight() {
  if (!current || gameOver || paused) return;
  current.x++;
  if (!isValid(current, board)) current.x--;
}
function rotate() {
  if (!current || gameOver || paused) return;
  const orig = current.blocks;
  current.blocks = rotateBlocks(current.blocks);
  if (!isValid(current, board)) {
    current.x -= 1;
    if (!isValid(current, board)) {
      current.x += 2;
      if (!isValid(current, board)) {
        current.x -= 3;
        if (!isValid(current, board)) {
          current.blocks = orig;
          current.x += 3;
          return;
        }
      }
    }
  }
}
function moveDown() {
  if (!current || gameOver || paused) return false;
  current.y++;
  if (!isValid(current, board)) {
    current.y--;
    lockPiece();
    draw();
  }
  return true;
}
function hardDrop() {
  if (!current || gameOver || paused) return;
  while (isValid({ ...current, y: current.y + 1 }, board)) {
    current.y++;
    score += 2;
  }
  lockPiece();
  updateUI();
}
function doAction(action) {
  if (gameOver || paused) return;
  switch(action) {
    case 'left': moveLeft(); break;
    case 'right': moveRight(); break;
    case 'down': moveDown(); score += 1; updateUI(); break;
    case 'rotate': rotate(); break;
    case 'drop': hardDrop(); updateUI(); break;
  }
  draw();
}

// ── Drop Loop ──
function resetDrop() {
  if (dropTimer) clearInterval(dropTimer);
  dropTimer = setInterval(() => { if (!gameOver && !paused) moveDown(); }, dropInterval);
}

// ── Game Over ──
function triggerGameOver() {
  gameOver = true;
  if (dropTimer) clearInterval(dropTimer);
  document.getElementById('final-score').textContent = score;
  const isTop = isInTop10(score);
  document.getElementById('top-msg').style.display = isTop ? 'block' : 'none';
  document.getElementById('name-input').style.display = isTop ? 'block' : 'none';
  const btn = document.getElementById('overlay-btn');
  btn.textContent = isTop ? '提交名字' : '再玩一次';
  btn.onclick = isTop ? submitName : handleOverlay;
  document.getElementById('overlay').classList.add('show');
  if (isTop) document.getElementById('name-input').focus();
}

function submitName() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { document.getElementById('name-input').focus(); return; }
  addScore(name, score);
  renderLeaderboard();
  handleOverlay();
}

function handleOverlay() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('name-input').value = '';
  initGame();
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (!started) return;
  if (e.key === 'p' || e.key === 'P') { paused = !paused; return; }
  if (gameOver || paused) return;
  switch(e.key) {
    case 'ArrowLeft': moveLeft(); break;
    case 'ArrowRight': moveRight(); break;
    case 'ArrowDown': moveDown(); score += 1; updateUI(); break;
    case 'ArrowUp': rotate(); break;
    case ' ': hardDrop(); updateUI(); break;
  }
  draw();
  e.preventDefault();
});

// ── Touch buttons ──
document.querySelectorAll('.touch-btn').forEach(btn => {
  const action = btn.dataset.action;
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    doAction(action);
  });
  btn.addEventListener('mousedown', e => {
    e.preventDefault();
    doAction(action);
  });
});

// ── Swipe on game canvas ──
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchStartTime = Date.now();
  e.preventDefault();
});
canvas.addEventListener('touchend', e => {
  if (gameOver || paused) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const dt = Date.now() - touchStartTime;
  if (dt < 200 && Math.abs(dx) < 20 && Math.abs(dy) < 20) {
    doAction('rotate');
  } else if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 30) doAction('right');
    else if (dx < -30) doAction('left');
  } else {
    if (dy > 50) doAction('drop');
    else if (dy > 30) doAction('down');
  }
  e.preventDefault();
});

// ── Resize ──
window.addEventListener('resize', () => {
  resizeGame();
});

// ── Init ──
function initGame() {
  board = newBoard();
  score = 0; lines = 0; level = 1;
  dropInterval = 800; bag = [];
  gameOver = false; paused = false;
  nextPiece = null;
  spawnPiece();
  updateUI();
  renderLeaderboard();
  resetDrop();
  draw();
}

// ── Start ──
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-overlay').classList.add('hidden');
  started = true;
  resizeGame();
  initGame();
});

// Initial
resizeGame();
renderLeaderboard();
</script>
