<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Blitz — Space Shooter</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Courier New', monospace;
    color: #0ff;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  #gameCanvas {
    display: block;
    border: 2px solid #0ff;
    box-shadow: 0 0 20px #0ff4, 0 0 60px #f0f2, inset 0 0 30px #0002;
    border-radius: 4px;
  }
  #ui-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #title-screen, #game-over-screen {
    text-align: center;
    pointer-events: auto;
    background: rgba(0,0,0,.85);
    padding: 48px 64px;
    border: 2px solid #0ff;
    border-radius: 8px;
    box-shadow: 0 0 40px #0ff4;
  }
  #title-screen h1, #game-over-screen h1 {
    font-size: 42px;
    color: #f0f;
    text-shadow: 0 0 10px #f0f, 0 0 30px #f0f;
    margin-bottom: 16px;
    letter-spacing: 4px;
  }
  #title-screen p, #game-over-screen p {
    font-size: 16px;
    color: #0ff;
    margin: 8px 0;
    text-shadow: 0 0 6px #0ff;
  }
  #title-screen .sub, #game-over-screen .sub {
    font-size: 13px;
    color: #888;
    margin-top: 20px;
  }
  #game-over-screen .score-display {
    font-size: 28px;
    color: #ff0;
    text-shadow: 0 0 10px #ff0;
    margin: 12px 0;
  }
  .blink {
    animation: blink-anim 1s step-end infinite;
  }
  @keyframes blink-anim {
    50% { opacity: 0; }
  }
  #controls-hint {
    margin-top: 12px;
    font-size: 12px;
    color: #555;
    text-align: center;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui-overlay">
  <div id="title-screen">
    <h1>NEON BLITZ</h1>
    <p>Space Shooter</p>
    <p class="blink" style="margin-top:24px;">Press SPACE or ENTER to Start</p>
    <p class="sub">← → or A/D to move &nbsp;|&nbsp; SPACE to shoot</p>
  </div>
  <div id="game-over-screen" class="hidden">
    <h1>GAME OVER</h1>
    <div class="score-display">Score: <span id="final-score">0</span></div>
    <p>Level Reached: <span id="final-level">1</span></p>
    <p class="blink" style="margin-top:24px;">Press SPACE or ENTER to Restart</p>
  </div>
</div>
<div id="controls-hint">← → / A D &nbsp; Move &nbsp;&nbsp;&nbsp; SPACE &nbsp; Shoot</div>

<script>
// ============================================================
//  NEON BLITZ — Complete Space Shooter
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- Responsive sizing ---
const GAME_W = 600;
const GAME_H = 800;
canvas.width = GAME_W;
canvas.height = GAME_H;

// Scale canvas to fit window
function resizeCanvas() {
  const maxH = window.innerHeight - 40;
  const maxW = window.innerWidth - 20;
  const scale = Math.min(maxW / GAME_W, maxH / GAME_H, 1.2);
  canvas.style.width = (GAME_W * scale) + 'px';
  canvas.style.height = (GAME_H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// --- Audio (Web Audio API) ---
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playSound(type) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const now = audioCtx.currentTime;

  if (type === 'shoot') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.exponentialRampToValueAtTime(440, now + 0.08);
    gain.gain.setValueAtTime(0.12, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc.start(now);
    osc.stop(now + 0.08);
  } else if (type === 'explosion') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.25);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    osc.start(now);
    osc.stop(now + 0.25);
  } else if (type === 'powerup') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, now);
    osc.frequency.setValueAtTime(659, now + 0.06);
    osc.frequency.setValueAtTime(784, now + 0.12);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.start(now);
    osc.stop(now + 0.2);
  } else if (type === 'hit') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(50, now + 0.12);
    gain.gain.setValueAtTime(0.18, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    osc.start(now);
    osc.stop(now + 0.12);
  } else if (type === 'levelup') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(440, now);
    osc.frequency.setValueAtTime(554, now + 0.08);
    osc.frequency.setValueAtTime(659, now + 0.16);
    osc.frequency.setValueAtTime(880, now + 0.24);
    gain.gain.setValueAtTime(0.14, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    osc.start(now);
    osc.stop(now + 0.4);
  }
}

// --- Game State ---
let gameState = 'title'; // 'title', 'playing', 'gameover'
let score = 0;
let lives = 3;
let level = 1;
let lastTime = 0;
let spawnTimer = 0;
let levelUpTimer = 0;
let levelUpText = '';
let levelUpAlpha = 0;

// --- Input ---
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    if (gameState === 'title') {
      initAudio();
      startGame();
    } else if (gameState === 'gameover') {
      startGame();
    }
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// --- Stars Background ---
const STARS_COUNT = 200;
const stars = [];
for (let i = 0; i < STARS_COUNT; i++) {
  stars.push({
    x: Math.random() * GAME_W,
    y: Math.random() * GAME_H,
    size: Math.random() * 2 + 0.5,
    speed: Math.random() * 2 + 1,
    alpha: Math.random() * 0.8 + 0.2
  });
}

// --- Player ---
const player = {
  x: GAME_W / 2,
  y: GAME_H - 60,
  w: 36,
  h: 40,
  speed: 280,
  shootCooldown: 0,
  shootRate: 0.18,
  shielded: false,
  shieldTimer: 0,
  rapidFire: false,
  rapidFireTimer: 0,
  multiShot: false,
  multiShotTimer: 0,
  invincible: false,
  invincibleTimer: 0,
  engineFlicker: 0
};

// --- Bullets ---
let playerBullets = [];
let enemyBullets = [];

// --- Enemies ---
let enemies = [];

const ENEMY_TYPES = {
  scout: { w: 30, h: 30, hp: 1, speed: 80, color: '#f0f', glowColor: '#f0f8', score: 10 },
  fighter: { w: 36, h: 36, hp: 2, speed: 60, color: '#f80', glowColor: '#f808', score: 15 },
  heavy: { w: 44, h: 44, hp: 4, speed: 40, color: '#f44', glowColor: '#f448', score: 25 },
  boss: { w: 64, h: 64, hp: 10, speed: 25, color: '#ff0', glowColor: '#ff08', score: 50 }
};

// --- Power-ups ---
let powerups = [];
const POWERUP_TYPES = {
  shield: { color: '#0ff', label: 'S', duration: 8 },
  rapid: { color: '#0f0', label: 'R', duration: 6 },
  multi: { color: '#f0f', label: 'M', duration: 7 }
};

// --- Particles ---
let particles = [];

// --- Explosions ---
let explosions = [];

// --- Helpers ---
function lerp(a, b, t) { return a + (b - a) * t; }
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function rectCollision(a, b) {
  return a.x - a.w/2 < b.x + b.w/2 &&
         a.x + a.w/2 > b.x - b.w/2 &&
         a.y - a.h/2 < b.y + b.h/2 &&
         a.y + a.h/2 > b.y - b.h/2;
}
function circleRectCollision(cx, cy, cr, rx, ry, rw, rh) {
  const closestX = Math.max(rx, Math.min(cx, rx + rw));
  const closestY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - closestX;
  const dy = cy - closestY;
  return (dx * dx + dy * dy) < (cr * cr);
}

// --- Spawn ---
function spawnEnemy() {
  const difficulty = level;
  let type;
  const roll = Math.random();
  if (difficulty >= 7 && roll < 0.05) type = 'boss';
  else if (difficulty >= 4 && roll < 0.2) type = 'heavy';
  else if (difficulty >= 2 && roll < 0.45) type = 'fighter';
  else type = 'scout';

  const t = ENEMY_TYPES[type];
  const speedMult = 1 + (difficulty - 1) * 0.08;
  const spawnPattern = Math.random() < 0.5 ? 'straight' : (Math.random() < 0.5 ? 'sine' : 'vshape');

  enemies.push({
    x: rand(30, GAME_W - 30),
    y: -t.h,
    w: t.w,
    h: t.h,
    hp: t.hp + Math.floor(difficulty / 5),
    maxHp: t.hp + Math.floor(difficulty / 5),
    speed: t.speed * speedMult,
    color: t.color,
    glowColor: t.glowColor,
    score: t.score,
    type: type,
    pattern: spawnPattern,
    patternTime: Math.random() * Math.PI * 2,
    patternAmp: rand(40, 100),
    patternFreq: rand(1.5, 3),
    shootTimer: rand(1, 3),
    shootRate: Math.max(0.6, 2 - difficulty * 0.1),
    baseX: 0 // set after first frame for v-shape
  });
  enemies[enemies.length-1].baseX = enemies[enemies.length-1].x;
}

function spawnPowerup(x, y) {
  const keys_arr = Object.keys(POWERUP_TYPES);
  const type = keys_arr[randInt(0, keys_arr.length - 1)];
  powerups.push({
    x, y, w: 24, h: 24, speed: 100,
    type, ...POWERUP_TYPES[type],
    bobTime: 0
  });
}

function createExplosion(x, y, color, count = 20) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = rand(50, 200);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: rand(2, 6),
      life: rand(0.3, 0.8),
      maxLife: rand(0.3, 0.8),
      color
    });
  }
  // Flash
  explosions.push({ x, y, radius: 5, maxRadius: rand(30, 60), life: 0.3, color });
}

// --- Game Start / Reset ---
function startGame() {
  gameState = 'playing';
  score = 0;
  lives = 3;
  level = 1;
  spawnTimer = 0;
  levelUpTimer = 0;
  levelUpText = '';
  levelUpAlpha = 0;
  player.x = GAME_W / 2;
  player.y = GAME_H - 60;
  player.shootCooldown = 0;
  player.shielded = false;
  player.shieldTimer = 0;
  player.rapidFire = false;
  player.rapidFireTimer = 0;
  player.multiShot = false;
  player.multiShotTimer = 0;
  player.invincible = false;
  player.invincibleTimer = 0;
  playerBullets = [];
  enemyBullets = [];
  enemies = [];
  powerups = [];
  particles = [];
  explosions = [];

  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('game-over-screen').classList.add('hidden');
}

function gameOver() {
  gameState = 'gameover';
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-level').textContent = level;
  document.getElementById('game-over-screen').classList.remove('hidden');
}

// --- Drawing Helpers ---
function drawGlow(x, y, radius, color) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
  grad.addColorStop(0, color);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
}

function drawNeonRect(x, y, w, h, color, glowSize = 10) {
  ctx.shadowColor = color;
  ctx.shadowBlur = glowSize;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.strokeRect(x - w/2, y - h/2, w, h);
  ctx.shadowBlur = 0;
}

function drawNeonText(text, x, y, size, color, align = 'center') {
  ctx.font = `bold ${size}px 'Courier New', monospace`;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  ctx.shadowColor = color;
  ctx.shadowBlur = 10;
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.shadowBlur = 0;
}

// --- Draw Player Ship ---
function drawPlayer() {
  const { x, y, w, h } = player;

  // Engine glow
  player.engineFlicker += 0.2;
  const flicker = 0.7 + Math.sin(player.engineFlicker) * 0.3;
  drawGlow(x, y + h/2 + 8, 15 * flicker, `rgba(0,255,255,${0.3 * flicker})`);

  // Engine flames
  ctx.save();
  ctx.fillStyle = `rgba(0,200,255,${flicker})`;
  ctx.beginPath();
  ctx.moveTo(x - 6, y + h/2);
  ctx.lineTo(x, y + h/2 + 12 + flicker * 6);
  ctx.lineTo(x + 6, y + h/2);
  ctx.fill();
  ctx.fillStyle = `rgba(100,255,255,${flicker * 0.7})`;
  ctx.beginPath();
  ctx.moveTo(x - 3, y + h/2);
  ctx.lineTo(x, y + h/2 + 8 + flicker * 4);
  ctx.lineTo(x + 3, y + h/2);
  ctx.fill();
  ctx.restore();

  // Ship body
  if (player.invincible && Math.floor(Date.now() / 80) % 2) return;

  ctx.save();
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 12;

  // Main hull
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, y - h/2);           // nose
  ctx.lineTo(x - w/2, y + h/3);     // left wing tip
  ctx.lineTo(x - w/4, y + h/6);     // left wing inner
  ctx.lineTo(x - w/6, y + h/2);     // left tail
  ctx.lineTo(x + w/6, y + h/2);     // right tail
  ctx.lineTo(x + w/4, y + h/6);     // right wing inner
  ctx.lineTo(x + w/2, y + h/3);     // right wing tip
  ctx.closePath();
  ctx.stroke();

  // Cockpit
  ctx.fillStyle = '#0ff4';
  ctx.fill();

  // Center line
  ctx.strokeStyle = '#0ff8';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, y - h/2 + 4);
  ctx.lineTo(x, y + h/6);
  ctx.stroke();

  ctx.restore();

  // Shield effect
  if (player.shielded) {
    ctx.save();
    ctx.strokeStyle = `rgba(0,255,255,${0.4 + Math.sin(Date.now() / 200) * 0.2})`;
    ctx.lineWidth = 2;
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(x, y, 28, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// --- Draw Enemy ---
function drawEnemy(e) {
  const { x, y, w, h, color, glowColor, type, hp, maxHp } = e;
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = 10;

  if (type === 'scout') {
    // Diamond shape
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y - h/2);
    ctx.lineTo(x + w/2, y);
    ctx.lineTo(x, y + h/2);
    ctx.lineTo(x - w/2, y);
    ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = glowColor;
    ctx.fill();
  } else if (type === 'fighter') {
    // Angular fighter
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y + h/2);
    ctx.lineTo(x + w/2, y - h/4);
    ctx.lineTo(x + w/4, y - h/2);
    ctx.lineTo(x - w/4, y - h/2);
    ctx.lineTo(x - w/2, y - h/4);
    ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = glowColor;
    ctx.fill();
  } else if (type === 'heavy') {
    // Heavy hexagon
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI / 3) * i - Math.PI / 6;
      ctx.lineTo(x + (w/2) * Math.cos(a), y + (h/2) * Math.sin(a));
    }
    ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = glowColor;
    ctx.fill();
  } else if (type === 'boss') {
    // Boss — large menacing shape
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, y - h/2);
    ctx.lineTo(x + w/2, y - h/4);
    ctx.lineTo(x + w/2, y + h/4);
    ctx.lineTo(x + w/4, y + h/2);
    ctx.lineTo(x - w/4, y + h/2);
    ctx.lineTo(x - w/2, y + h/4);
    ctx.lineTo(x - w/2, y - h/4);
    ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = glowColor;
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#f00';
    ctx.shadowColor = '#f00';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(x - 10, y - 5, 4, 0, Math.PI * 2);
    ctx.arc(x + 10, y - 5, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // HP bar for multi-hp enemies
  if (maxHp > 1) {
    const barW = w;
    const barH = 3;
    const barY = y - h/2 - 8;
    ctx.fillStyle = '#333';
    ctx.fillRect(x - barW/2, barY, barW, barH);
    ctx.fillStyle = color;
    ctx.fillRect(x - barW/2, barY, barW * (hp / maxHp), barH);
  }

  ctx.restore();
}

// --- Draw Bullet ---
function drawBullet(b) {
  ctx.save();
  ctx.shadowColor = b.color || '#0ff';
  ctx.shadowBlur = 8;
  ctx.fillStyle = b.color || '#0ff';
  if (b.wide) {
    ctx.fillRect(b.x - 2, b.y - 8, 4, 16);
  } else {
    ctx.fillRect(b.x - 1.5, b.y - 6, 3, 12);
  }
  // Core
  ctx.fillStyle = '#fff';
  ctx.fillRect(b.x - 0.5, b.y - 4, 1, 8);
  ctx.restore();
}

// --- Draw Power-up ---
function drawPowerup(p) {
  p.bobTime += 0.05;
  const bobY = Math.sin(p.bobTime * 3) * 3;
  const py = p.y + bobY;

  ctx.save();
  ctx.shadowColor = p.color;
  ctx.shadowBlur = 15;

  // Rotating diamond
  const rot = p.bobTime * 2;
  ctx.strokeStyle = p.color;
  ctx.lineWidth = 2;
  ctx.save();
  ctx.translate(p.x, py);
  ctx.rotate(rot);
  ctx.beginPath();
  ctx.moveTo(0, -12);
  ctx.lineTo(12, 0);
  ctx.lineTo(0, 12);
  ctx.lineTo(-12, 0);
  ctx.closePath();
  ctx.stroke();
  ctx.fillStyle = p.color + '33';
  ctx.fill();
  ctx.restore();

  // Label
  ctx.font = 'bold 14px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = p.color;
  ctx.fillText(p.label, p.x, py);

  ctx.restore();
}

// --- Update ---
function update(dt) {
  if (gameState !== 'playing') return;

  // Update stars
  for (const s of stars) {
    s.y += s.speed * dt * 60;
    if (s.y > GAME_H) { s.y = 0; s.x = Math.random() * GAME_W; }
  }

  // --- Player movement ---
  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed * dt;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed * dt;
  player.x = Math.max(player.w/2, Math.min(GAME_W - player.w/2, player.x));

  // --- Player shooting ---
  player.shootCooldown -= dt;
  const rate = player.rapidFire ? player.shootRate * 0.4 : player.shootRate;
  if (keys['Space'] && player.shootCooldown <= 0) {
    player.shootCooldown = rate;
    playSound('shoot');

    if (player.multiShot) {
      playerBullets.push({ x: player.x, y: player.y - player.h/2, vy: -500, color: '#f0f', wide: true });
      playerBullets.push({ x: player.x - 10, y: player.y - player.h/2 + 5, vy: -500, vx: -30, color: '#f0f' });
      playerBullets.push({ x: player.x + 10, y: player.y - player.h/2 + 5, vy: -500, vx: 30, color: '#f0f' });
    } else {
      playerBullets.push({ x: player.x, y: player.y - player.h/2, vy: -500, color: '#0ff' });
    }
  }

  // --- Player powerup timers ---
  if (player.shielded) {
    player.shieldTimer -= dt;
    if (player.shieldTimer <= 0) player.shielded = false;
  }
  if (player.rapidFire) {
    player.rapidFireTimer -= dt;
    if (player.rapidFireTimer <= 0) player.rapidFire = false;
  }
  if (player.multiShot) {
    player.multiShotTimer -= dt;
    if (player.multiShotTimer <= 0) player.multiShot = false;
  }
  if (player.invincible) {
    player.invincibleTimer -= dt;
    if (player.invincibleTimer <= 0) player.invincible = false;
  }

  // --- Update player bullets (with size cap) ---
  for (let i = playerBullets.length - 1; i >= 0; i--) {
    const b = playerBullets[i];
    b.y += b.vy * dt;
    b.x += (b.vx || 0) * dt;
    if (b.y < -20 || b.x < -20 || b.x > GAME_W + 20) {
      playerBullets.splice(i, 1);
    }
  }
  // Cap array size (emergency cleanup)
  if (playerBullets.length > MAX_BULLETS) {
    playerBullets.splice(0, playerBullets.length - MAX_BULLETS);
  }

  // --- Spawn enemies ---
  const spawnRate = Math.max(0.3, 1.2 - level * 0.08);
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnTimer = spawnRate;
    // Sometimes spawn in groups (immediate, no setTimeout to avoid accumulation)
    const count = (enemies.length < MAX_ENEMIES) && level >= 4 && Math.random() < 0.3
      ? randInt(2, 3 + Math.floor(level/3)) : 1;
    for (let i = 0; i < count; i++) {
      if (enemies.length < MAX_ENEMIES) spawnEnemy();
    }
  }

  // --- Update enemies ---
  const enemiesToRemove = new Set();
  const playerBulletsToRemove = new Set();

  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    e.patternTime += dt * e.patternFreq;

    // Vertical movement
    e.y += e.speed * dt;

    // Horizontal pattern
    if (e.pattern === 'sine') {
      e.x = e.baseX + Math.sin(e.patternTime) * e.patternAmp;
    } else if (e.pattern === 'vshape') {
      e.x = e.baseX + Math.abs(Math.sin(e.patternTime)) * e.patternAmp;
    }
    // 'straight' — no extra horizontal movement

    // Enemy shooting
    if (e.type !== 'scout') {
      e.shootTimer -= dt;
      if (e.shootTimer <= 0) {
        e.shootTimer = e.shootRate * rand(0.7, 1.3);
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        enemyBullets.push({
          x: e.x, y: e.y + e.h/2,
          vx: Math.cos(angle) * 200,
          vy: Math.sin(angle) * 200,
          color: '#f44'
        });
      }
    }

    // Off screen bottom
    if (e.y > GAME_H + 50) {
      enemiesToRemove.add(i);
      if (!player.invincible) {
        lives--;
        player.invincible = true;
        player.invincibleTimer = 2;
        playSound('hit');
        if (lives <= 0) gameOver();
      }
      continue;
    }

    // Skip if already marked for removal
    if (enemiesToRemove.has(i)) continue;

    // Bullet-enemy collision
    for (let j = 0; j < playerBullets.length; j++) {
      if (playerBulletsToRemove.has(j)) continue;
      const b = playerBullets[j];
      if (circleRectCollision(b.x, b.y, 4, e.x - e.w/2, e.y - e.h/2, e.w, e.h)) {
        playerBulletsToRemove.add(j);
        e.hp--;
        if (e.hp <= 0) {
          // Destroyed
          score += e.score;
          createExplosion(e.x, e.y, e.color, e.type === 'boss' ? 50 : 20);
          playSound('explosion');

          // Power-up drop chance
          if (Math.random() < 0.12) {
            spawnPowerup(e.x, e.y);
          }

          enemiesToRemove.add(i);
        }
        break;
      }
    }

    // Player-enemy collision
    if (!enemiesToRemove.has(i) && rectCollision(
      { x: player.x, y: player.y, w: player.w * 0.6, h: player.h * 0.6 },
      { x: e.x, y: e.y, w: e.w, h: e.h }
    )) {
      if (player.shielded) {
        createExplosion(e.x, e.y, e.color);
        score += e.score;
        enemiesToRemove.add(i);
        playSound('explosion');
      } else if (!player.invincible) {
        createExplosion(e.x, e.y, e.color);
        enemiesToRemove.add(i);
        lives--;
        player.invincible = true;
        player.invincibleTimer = 2;
        playSound('hit');
        if (lives <= 0) gameOver();
      }
    }
  }

  // Remove marked enemies and bullets (backward splice to keep indices valid)
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (enemiesToRemove.has(i)) enemies.splice(i, 1);
  }
  for (let j = playerBullets.length - 1; j >= 0; j--) {
    if (playerBulletsToRemove.has(j)) playerBullets.splice(j, 1);
  }

  // --- Update enemy bullets ---
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.y > GAME_H + 20 || b.y < -20 || b.x < -20 || b.x > GAME_W + 20) {
      enemyBullets.splice(i, 1);
      continue;
    }
    // Hit player
    if (!player.invincible && circleRectCollision(b.x, b.y, 4, player.x - player.w/3, player.y - player.h/3, player.w*0.66, player.h*0.66)) {
      enemyBullets.splice(i, 1);
      if (player.shielded) {
        player.shielded = false;
        player.shieldTimer = 0;
        playSound('hit');
      } else {
        lives--;
        player.invincible = true;
        player.invincibleTimer = 2;
        createExplosion(player.x, player.y, '#0ff', 15);
        playSound('hit');
        if (lives <= 0) gameOver();
      }
    }
  }

  // --- Update powerups ---
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.speed * dt;
    if (p.y > GAME_H + 30) {
      powerups.splice(i, 1);
      continue;
    }
    // Collect
    if (circleRectCollision(player.x, player.y, 20, p.x - p.w/2, p.y - p.h/2, p.w, p.h)) {
      playSound('powerup');
      if (p.type === 'shield') { player.shielded = true; player.shieldTimer = p.duration; }
      if (p.type === 'rapid') { player.rapidFire = true; player.rapidFireTimer = p.duration; }
      if (p.type === 'multi') { player.multiShot = true; player.multiShotTimer = p.duration; }
      // Sparkle
      createExplosion(p.x, p.y, p.color, 8);
      powerups.splice(i, 1);
    }
  }

  // --- Update particles ---
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 80 * dt; // gravity
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // --- Update explosions ---
  for (let i = explosions.length - 1; i >= 0; i--) {
    const e = explosions[i];
    e.life -= dt;
    e.radius += (e.maxRadius - e.radius) * dt * 8;
    if (e.life <= 0) explosions.splice(i, 1);
  }

  // --- Level up ---
  const newLevel = Math.floor(score / 50) + 1;
  if (newLevel > level) {
    level = newLevel;
    levelUpText = `LEVEL ${level}`;
    levelUpAlpha = 2;
    playSound('levelup');
  }
  if (levelUpAlpha > 0) levelUpAlpha -= dt * 0.8;
}

// --- Render ---
function render() {
  // Background
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Subtle grid
  ctx.strokeStyle = '#0ff08';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < GAME_W; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, GAME_H);
    ctx.stroke();
  }
  for (let y = 0; y < GAME_H; y += 40) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(GAME_W, y);
    ctx.stroke();
  }

  // Stars
  for (const s of stars) {
    ctx.fillStyle = `rgba(200,220,255,${s.alpha})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }

  if (gameState !== 'playing' && gameState !== 'gameover') return;

  // Explosions
  for (const e of explosions) {
    const alpha = e.life / 0.3;
    drawGlow(e.x, e.y, e.radius, e.color + Math.floor(alpha * 40).toString(16).padStart(2, '0'));
  }

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Power-ups
  for (const p of powerups) drawPowerup(p);

  // Player bullets
  for (const b of playerBullets) drawBullet(b);

  // Enemy bullets
  for (const b of enemyBullets) drawBullet(b);

  // Enemies
  for (const e of enemies) drawEnemy(e);

  // Player
  if (gameState === 'playing') drawPlayer();

  // --- HUD ---
  // Score
  drawNeonText(`SCORE  ${score}`, 120, 30, 20, '#0ff', 'left');

  // Lives
  ctx.save();
  ctx.shadowColor = '#0f0';
  ctx.shadowBlur = 8;
  for (let i = 0; i < lives; i++) {
    const lx = 20 + i * 28;
    const ly = 28;
    ctx.strokeStyle = '#0f0';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(lx, ly - 8);
    ctx.lineTo(lx - 7, ly + 4);
    ctx.lineTo(lx - 2, ly + 1);
    ctx.lineTo(lx, ly + 8);
    ctx.lineTo(lx + 2, ly + 1);
    ctx.lineTo(lx + 7, ly + 4);
    ctx.closePath();
    ctx.stroke();
  }
  ctx.restore();

  // Level
  drawNeonText(`LEVEL ${level}`, GAME_W - 80, 30, 18, '#ff0', 'right');

  // Power-up indicators
  let indicatorY = 56;
  if (player.shielded) {
    ctx.fillStyle = '#0ff';
    ctx.font = '12px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(`SHIELD ${player.shieldTimer.toFixed(1)}s`, 20, indicatorY);
    indicatorY += 16;
  }
  if (player.rapidFire) {
    ctx.fillStyle = '#0f0';
    ctx.font = '12px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(`RAPID ${player.rapidFireTimer.toFixed(1)}s`, 20, indicatorY);
    indicatorY += 16;
  }
  if (player.multiShot) {
    ctx.fillStyle = '#f0f';
    ctx.font = '12px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(`MULTI ${player.multiShotTimer.toFixed(1)}s`, 20, indicatorY);
  }

  // Level up text
  if (levelUpAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, levelUpAlpha);
    drawNeonText(levelUpText, GAME_W / 2, GAME_H / 2 - 40, 48, '#ff0');
    ctx.restore();
  }

  // Vignette effect
  const vignette = ctx.createRadialGradient(GAME_W/2, GAME_H/2, GAME_H*0.3, GAME_W/2, GAME_H/2, GAME_H*0.7);
  vignette.addColorStop(0, 'transparent');
  vignette.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  for (let y = 0; y < GAME_H; y += 3) {
    ctx.fillRect(0, y, GAME_W, 1);
  }
}

// --- Safety: max array sizes to prevent memory leaks ---
const MAX_PARTICLES = 500;
const MAX_EXPLOSIONS = 50;
const MAX_ENEMIES = 100;
const MAX_BULLETS = 300;

// --- Canvas context lost handling ---
canvas.addEventListener('webglcontextlost', function(e) {
  e.preventDefault();
  gameState = 'gameover';
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-level').textContent = level;
  document.getElementById('game-over-screen').classList.remove('hidden');
});

canvas.addEventListener('webglrestored', function(e) {
  initAudio();
  gameState = 'title';
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
});

// --- Error boundary ---
function safeUpdate(dt) {
  try { update(dt); }
  catch(e) { console.error('Update error:', e); gameState = 'gameover'; }
}

function safeRender() {
  try { render(); }
  catch(e) { console.error('Render error:', e); }
}

// --- Game Loop ---
function gameLoop(timestamp) {
  try {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // cap at 50ms
    lastTime = timestamp;

    // Update stars even in title/gameover
    if (gameState !== 'playing') {
      for (const s of stars) {
        s.y += s.speed * dt * 60;
        if (s.y > GAME_H) { s.y = 0; s.x = Math.random() * GAME_W; }
      }
      // Update particles/explosions for visual flair
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
      }
      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].life -= dt;
        if (explosions[i].life <= 0) explosions.splice(i, 1);
      }
    }

    safeUpdate(dt);
    safeRender();
  } catch(e) {
    console.error('Game loop error:', e);
    gameState = 'gameover';
  }
  requestAnimationFrame(gameLoop);
}

// --- Start ---
lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
</body>
